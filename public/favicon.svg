<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="192" height="192">

  <!-- Shield background -->
  <path d="M100,4 L188,32 L196,172 Q196,222 100,244 Q4,222 4,172 L12,32 Z" fill="#0b1f3a"/>

  <!-- Shield gold border -->
  <path d="M100,14 L180,38 L187,170 Q187,214 100,234 Q13,214 13,170 L20,38 Z" fill="none" stroke="#e3a714" stroke-width="2.5" opacity="0.45"/>

  <!-- Grill panel -->
  <rect x="28" y="62" width="144" height="108" rx="8" fill="#0d2545"/>

  <!-- Grill lines -->
  <rect x="40" y="78"  width="120" height="6" rx="2" fill="#e3a714" opacity="0.75"/>
  <rect x="40" y="92"  width="120" height="6" rx="2" fill="#e3a714" opacity="0.55"/>
  <rect x="40" y="106" width="120" height="6" rx="2" fill="#e3a714" opacity="0.35"/>
  <rect x="40" y="120" width="120" height="6" rx="2" fill="#e3a714" opacity="0.2"/>
  <rect x="40" y="134" width="120" height="6" rx="2" fill="#e3a714" opacity="0.1"/>

  <!-- Center T badge -->
  <rect x="72" y="76" width="56" height="56" rx="6" fill="#0b1f3a" stroke="#e3a714" stroke-width="2"/>
  <text x="100" y="117" text-anchor="middle" font-family="Arial Black,Impact,sans-serif" font-size="36" font-weight="900" fill="#e3a714">T</text>

  <!-- Left headlight -->
  <rect x="20" y="64" width="36" height="28" rx="6" fill="#e3a714"/>
  <rect x="24" y="68" width="28" height="20" rx="4" fill="#fffbe0"/>
  <rect x="26" y="70" width="10" height="6" rx="2" fill="white" opacity="0.55"/>

  <!-- Right headlight -->
  <rect x="144" y="64" width="36" height="28" rx="6" fill="#e3a714"/>
  <rect x="148" y="68" width="28" height="20" rx="4" fill="#fffbe0"/>
  <rect x="150" y="70" width="10" height="6" rx="2" fill="white" opacity="0.55"/>

  <!-- Bumper -->
  <rect x="24" y="158" width="152" height="16" rx="5" fill="#e3a714"/>
  <rect x="74" y="160" width="52" height="12" rx="3" fill="#b8860e"/>

  <!-- Cab roof bar -->
  <rect x="34" y="40" width="132" height="26" rx="7" fill="#e3a714"/>
  <!-- Roof marker lights -->
  <circle cx="54"  cy="53" r="5" fill="#fffbe0"/>
  <circle cx="72"  cy="53" r="5" fill="#fffbe0"/>
  <circle cx="90"  cy="53" r="5" fill="#fffbe0"/>
  <circle cx="108" cy="53" r="5" fill="#fffbe0"/>
  <circle cx="126" cy="53" r="5" fill="#fffbe0"/>
  <circle cx="144" cy="53" r="5" fill="#fffbe0"/>
  <circle cx="162" cy="53" r="5" fill="#fffbe0"/>

  <!-- Roof ridge -->
  <rect x="56" y="24" width="88" height="20" rx="5" fill="#b8860e"/>

  <!-- Exhaust stacks -->
  <rect x="30" y="6"  width="10" height="36" rx="4" fill="#1a3a5c"/>
  <rect x="160" y="6" width="10" height="36" rx="4" fill="#1a3a5c"/>
  <!-- Smoke puffs -->
  <circle cx="35"  cy="5" r="5" fill="#8899aa" opacity="0.2"/>
  <circle cx="165" cy="5" r="5" fill="#8899aa" opacity="0.2"/>

  <!-- Left wheel -->
  <circle cx="54"  cy="188" r="26" fill="#0b1f3a" stroke="#e3a714" stroke-width="2.5"/>
  <circle cx="54"  cy="188" r="16" fill="#0d2545"/>
  <circle cx="54"  cy="188" r="6"  fill="#e3a714"/>
  <circle cx="54"  cy="173" r="2.5" fill="#e3a714" opacity="0.5"/>
  <circle cx="54"  cy="203" r="2.5" fill="#e3a714" opacity="0.5"/>
  <circle cx="39"  cy="188" r="2.5" fill="#e3a714" opacity="0.5"/>
  <circle cx="69"  cy="188" r="2.5" fill="#e3a714" opacity="0.5"/>

  <!-- Right wheel -->
  <circle cx="146" cy="188" r="26" fill="#0b1f3a" stroke="#e3a714" stroke-width="2.5"/>
  <circle cx="146" cy="188" r="16" fill="#0d2545"/>
  <circle cx="146" cy="188" r="6"  fill="#e3a714"/>
  <circle cx="146" cy="173" r="2.5" fill="#e3a714" opacity="0.5"/>
  <circle cx="146" cy="203" r="2.5" fill="#e3a714" opacity="0.5"/>
  <circle cx="131" cy="188" r="2.5" fill="#e3a714" opacity="0.5"/>
  <circle cx="161" cy="188" r="2.5" fill="#e3a714" opacity="0.5"/>

</svg>
